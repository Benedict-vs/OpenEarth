# nginx: serve the built SPA and reverse-proxy /api → the api service.
#
# CRITICAL for SSE: the job progress stream (EventSourceResponse) dies behind
# nginx's default response buffering, and long analyze/timelapse jobs outrun the
# default 60 s proxy_read_timeout. Both are fixed on the /api location below.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets are content-hashed by Vite → cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── SSE-safe: no buffering, allow a long-lived stream ──
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback: unknown routes serve index.html (client-side view switching).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
