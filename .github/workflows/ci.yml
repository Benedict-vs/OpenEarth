name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lockfile up to date
        run: uv lock --check

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      # Live EE tests are marked `ee` and excluded by default (addopts).
      # No Earth Engine credentials exist in CI, ever.
      - name: Tests (offline)
        run: uv run pytest
