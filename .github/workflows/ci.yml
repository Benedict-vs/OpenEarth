name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lockfile up to date
        run: uv lock --check

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      # Live EE tests are marked `ee` and excluded by default (addopts).
      # No Earth Engine credentials exist in CI, ever.
      - name: Tests (offline)
        run: uv run pytest

      # The web build consumes the committed openapi.json; fail if it drifts
      # from the actual FastAPI schema.
      - name: OpenAPI schema in sync
        run: uv run python scripts/export_openapi.py | diff - apps/web/openapi.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Tests
        run: pnpm test -- --run

      - name: Build
        run: pnpm build
