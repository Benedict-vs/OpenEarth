[project]
name = "openearth-api"
version = "2.0.0a0"
description = "OpenEarth FastAPI backend: catalog, tiles, thumbnails."
requires-python = ">=3.12,<3.14"
dependencies = [
    "openearth-core",
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.34,<1",
    "diskcache>=5.6,<6",
    "httpx>=0.28,<1",
]

[tool.uv.sources]
openearth-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openearth_api"]
