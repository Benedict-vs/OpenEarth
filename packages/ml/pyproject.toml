[project]
name = "openearth-ml"
version = "2.0.0a0"
description = "OpenEarth ML tier: U-Net training + ONNX export. Depends on core; NEVER imported by core or api (which serve via onnxruntime)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "openearth-core",
    "torch>=2.12",
    "segmentation-models-pytorch>=0.5",
    "onnxruntime>=1.27",
    "typer>=0.12",
    "numpy>=1.26,<3",
]

[tool.uv.sources]
openearth-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openearth_ml"]
